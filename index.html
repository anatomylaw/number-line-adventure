<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Line Adventure</title>

  <!-- PWA / iPad app support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Number Line Adventure">
  <meta name="theme-color" content="#0f172a">

  <link rel="manifest" id="dynamic-manifest">
  <style>
    :root {
      --sky-50: #f0f9ff;
      --sky-100: #e0f2fe;
      --sky-300: #7dd3fc;
      --sky-700: #0369a1;
      --amber-50: #fffbeb;
      --amber-300: #fcd34d;
      --amber-400: #fbbf24;
      --emerald-50: #ecfdf5;
      --emerald-400: #34d399;
      --emerald-700: #047857;
      --purple-50: #faf5ff;
      --purple-100: #f3e8ff;
      --purple-300: #d8b4fe;
      --purple-400: #c084fc;
      --purple-500: #a855f7;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-900: #0f172a;
      --white: #ffffff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --shadow-sm: 0 4px 14px rgba(15, 23, 42, 0.06);
      --radius-xl: 20px;
      --radius-2xl: 28px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(to bottom, var(--sky-50), var(--white), var(--amber-50));
      color: var(--slate-900);
    }

    .page {
      min-height: 100vh;
      padding: 20px;
    }

    .layout {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 24px;
    }
